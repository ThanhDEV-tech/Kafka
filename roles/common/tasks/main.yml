---
- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts
  blockinfile:
    path: /etc/hosts
    block: |
      {% for host in groups['kafka'] %}
      {{ hostvars[host]['ansible_host'] }} {{ host }}
      {% endfor %}
    marker: "# {mark} ANSIBLE MANAGED BLOCK"

- name: Update OS
  apt:
    update_cache: yes
    upgrade: yes

- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Disable swap
  command: swapoff -a
  when:
    - ansible_swaptotal_mb > 0
    - disable_swap | default(false)

- name: Remove swap from fstab
  lineinfile:
    path: /etc/fstab
    regexp: '.*swap.*'
    state: absent

- name: Create kafka data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    mode: '0755'
  loop:
    - "{{ kafka_data_dir }}"
    - "{{ kafka_log_dir }}"
    - "{{ kafka_metadata_dir }}"
  when: inventory_hostname in groups['kafka']

- name: Apply sysctl settings
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: 'vm.swappiness', value: '1' }
    - { name: 'net.core.somaxconn', value: '65535' }
    - { name: 'net.ipv4.tcp_max_syn_backlog', value: '65535' }
  when: inventory_hostname in groups['kafka']

- name: Set file descriptor limits for kafka
  blockinfile:
    path: /etc/security/limits.d/kafka.conf
    create: yes
    block: |
      kafka soft nofile 100000
      kafka hard nofile 100000
  when: inventory_hostname in groups['kafka']

- name: Add ALB hostname to /etc/hosts for hairpin NAT workaround
  lineinfile:
    path: /etc/hosts
    line: "{{ ansible_host }} {{ alb_hostname }}"
    state: present
  when: inventory_hostname in groups['kafka_ui']