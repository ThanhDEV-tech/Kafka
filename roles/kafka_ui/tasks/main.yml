---
# Install Docker
- name: Install required packages for Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Create kafka-ui directory
  file:
    path: "{{ kafka_ui_dir }}"
    state: directory
    mode: '0755'

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ kafka_ui_dir }}/docker-compose.yml"
    mode: '0644'

- name: Deploy config.yml
  template:
    src: config.yml.j2
    dest: "{{ kafka_ui_dir }}/config.yml"
    mode: '0644'

- name: Start Postgres and Keycloak
  command: docker compose up -d postgres keycloak
  args:
    chdir: "{{ kafka_ui_dir }}"
  become: yes

- name: Wait for Keycloak to be ready
  uri:
    url: "http://127.0.0.1:9000/health/ready"
    status_code: 200
  register: keycloak_health
  until: keycloak_health.status == 200
  retries: 60
  delay: 15
  ignore_errors: yes

- name: Start Kafka UI
  command: docker compose up -d kafka-ui
  args:
    chdir: "{{ kafka_ui_dir }}"
  become: yes

- name: Wait for Kafka UI to be ready
  uri:
    url: "http://127.0.0.1:{{ kafka_ui_port }}/actuator/health"
    status_code: 200
  register: kafkaui_health
  until: kafkaui_health.status == 200
  retries: 30
  delay: 10
  ignore_errors: yes

- name: Copy realm export file to server
  copy:
    src: prod-realm.json
    dest: /tmp/prod-realm.json
    mode: '0644'

- name: Import Keycloak realm via REST API
  shell: |
    TOKEN=$(curl -s -X POST \
      "http://localhost:{{ keycloak_port }}/realms/master/protocol/openid-connect/token" \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -d "username={{ keycloak_admin_user }}&password={{ keycloak_admin_password }}&grant_type=password&client_id=admin-cli" \
      | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

    REALM_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
      -H "Authorization: Bearer $TOKEN" \
      "http://localhost:{{ keycloak_port }}/admin/realms/prod")

    if [ "$REALM_EXISTS" = "200" ]; then
      echo "Realm already exists, skipping import"
    else
      curl -s -X POST \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d @/tmp/prod-realm.json \
        "http://localhost:{{ keycloak_port }}/admin/realms"
      echo "Realm imported successfully"
    fi
  register: realm_import
  changed_when: "'imported successfully' in realm_import.stdout"