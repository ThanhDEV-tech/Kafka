---
# Kafka version
kafka_version: "4.1.1"
scala_version: "2.13"

# Paths
kafka_base_dir: "/opt/kafka"
kafka_data_dir: "/data/kafka"
kafka_log_dir: "{{ kafka_data_dir }}/logs"
kafka_metadata_dir: "{{ kafka_data_dir }}/metadata"
kafka_backup_dir: "{{ kafka_base_dir }}/backups"

# Kafka user
kafka_user: "kafka"
kafka_group: "kafka"

# Cluster
kafka_cluster_id: "" 

# Timezone
timezone: "Asia/Ho_Chi_Minh"