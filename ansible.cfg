[defaults]
inventory = inventory/hosts.ini
remote_user = ubuntu
private_key_file = /home/ubuntu/.ssh/kafka-lab-key.pem
host_key_checking = False
retry_files_enabled = False
roles_path = roles
vault_password_file = /root/.vault_pass

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no
pipelining = True

